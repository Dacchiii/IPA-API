<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>IPA API test</title>
  <style>
    body {display:flex; flex-direction:column;}
  </style>
</head>
<body>
  <div>
    <button id="start">録音開始</button>
    <button id="show">IPA表示</button>
    <button id="clear">クリア</button>
  </div>
  <pre id="out" style="display:flex; max-width:200px; overflow-wrap:break-word; word-break:break-all; min-width:0; white-space: pre-wrap;"></pre>
  <script src="ipa-api.js"></script>
  <script>
    document.getElementById("start").onclick = async () => {
      await IPA.start();
    };

    document.getElementById("show").onclick = () => {
      document.getElementById("out").textContent = IPA.render();
    };

    document.getElementById("clear").onclick = () => {
      IPA.clear();
      document.getElementById("out").textContent = "";
    };
  </script>
</body>
</html>
